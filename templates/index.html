<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flask MVP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 60px auto;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            color: #333;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        pre {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <a href="/html_tags">介紹Html5</a>
    
    <h1>Flask MVP Website</h1>
    <p>這是一個最小可行版本的 Flask 網站。</p>

    <div class="card">
        <h2>測試 API</h2>
        <button onclick="loadMessage()">取得訊息</button>
        <pre id="result">尚未請求 API</pre>
    </div>

    <script>
        async function loadMessage() {
            const response = await fetch("/api/hello");
            const data = await response.json();
            document.getElementById("result").textContent =
                JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
